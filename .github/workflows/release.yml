name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update Version in Build Scripts
        run: |
          sed -i 's/PKG_VERSION="[^"]*"/PKG_VERSION="'${VERSION}'"/g' scripts/build_local.sh
          sed -i 's/pkgver=[0-9.]*/pkgver='${VERSION}'/g' Makefile

      - name: Build IPK (OpenWrt ≤ 23.05)
        run: |
          bash scripts/build_local.sh

      - name: Build APK (OpenWrt ≥ 24.10)
        run: |
          docker run --rm -v ${{ github.workspace }}:/work alpine:latest sh -c '
          set -e
          echo "https://dl-cdn.alpinelinux.org/alpine/v3.20/main" > /etc/apk/repositories
          echo "https://dl-cdn.alpinelinux.org/alpine/v3.20/community" >> /etc/apk/repositories

          apk update -q
          apk add abuild openssl -q

          KEY=/root/pkg.rsa
          openssl genrsa -out "$KEY" 2048 2>/dev/null
          openssl rsa -in "$KEY" -pubout -out "${KEY}.pub" 2>/dev/null
          cp "${KEY}.pub" /etc/apk/keys/

          mkdir -p /root/.abuild
          cat > /root/.abuild/abuild.conf << "CONF"
          PACKAGER="mortezabahmani"
          PACKAGER_PRIVKEY="/root/pkg.rsa"
          CONF

          mkdir -p /tmp/build
          cat > /tmp/build/APKBUILD << "APKEOF"
          pkgname=luci-app-adg-dnslookup
          pkgver='${VERSION}'
          pkgrel=1
          pkgdesc="LuCI support for AdGuard Home DNS Lookup"
          url="https://github.com/mortezabahmani/luci-app-adg-dnslookup"
          arch="noarch"
          license="MIT"
          depends="curl"
          options="!check !strip !fhs"
          source=""
          builddir=""

          package() {
            mkdir -p "$pkgdir"
            cp -a /work/root/. "$pkgdir/"
            mkdir -p "$pkgdir/usr/lib/lua/luci"
            cp -a /work/luasrc/. "$pkgdir/usr/lib/lua/luci/"
            chmod 755 "$pkgdir/usr/bin/adg-sync.sh" || true
            chmod 755 "$pkgdir/etc/init.d/adg_dnslookup" || true
          }
          APKEOF

          cd /tmp/build
          abuild -F rootpkg

          find /root/packages -name "*.apk" -exec cp -v {} /work/luci-app-adg-dnslookup_'${VERSION}'-1_all.apk \;
          '

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            luci-app-adg-dnslookup_${{ env.VERSION }}-1_all.ipk
            luci-app-adg-dnslookup_${{ env.VERSION }}-1_all.apk
          name: Release ${{ steps.get_version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
